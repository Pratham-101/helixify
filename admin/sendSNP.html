<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload SNP files</title>
    <link rel="stylesheet" href="sendSNP_styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.9.359/pdf.min.js"></script>
</head>
<body>
    <div>
        <div class="heading">
            <h1>Upload SNP files</h1>
            <p class="subtitles">Upload SNP files to Helixify</p>
            <p class="subtitles">Supported file formats: .csv, .tsv, .txt, .vcf</p>
        </div>
        <div class="upload-box" id="uploadBox">
            <p id="dragAndDropText">Drag & drop your file here or click to select</p>
            <input type="file" id="fileInput" accept=".csv,.tsv,.txt,.vcf">
        </div>
        <div class="upload-status" id="uploadStatus"></div>
    </div>

    <div class="finalReport">
        <h1>Final Report</h1>
        <p>Here's the final report:</p>
        <div class="pdf-container">
            <canvas id="pdf-viewer"></canvas>
        </div>
        <button id="downloadPdf" class="download-button">Download PDF</button>
    </div>

    <script src="sendSNP.js"></script>
</body>
</html>
